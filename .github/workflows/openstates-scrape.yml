name: OpenStates Scrape for vt

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6:00 AM UTC (1:00 AM Chicago / 2:00 AM Eastern)
  workflow_dispatch:
    inputs:
      force-update:
        type: boolean
        description: "Force push even if upstream changed (use with caution)"
        default: false

env:
  STATE_CODE: vt

jobs:
  scrape:
    name: "🕷️ Scrape Data"
    runs-on: self-hosted
    timeout-minutes: 720
    permissions:
      contents: write

    steps:
      - name: Checkout state repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run scraper action
        id: scrape
        uses: chihacknight/govbot/actions/scrape@main
        with:
          state: ${{ env.STATE_CODE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-and-push: true
          force-update: ${{ inputs.force-update }}
          branch: main
          api-keys: |
            {
              "DC_API_KEY": "${{ secrets.DC_API_KEY }}",
              "NEW_YORK_API_KEY": "${{ secrets.NEW_YORK_API_KEY }}",
              "INDIANA_API_KEY": "${{ secrets.INDIANA_API_KEY }}",
              "USER_AGENT": "${{ secrets.USER_AGENT }}"
            }
